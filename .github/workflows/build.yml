            build-essential autoconf automake libtool pkg-config \
            libgcrypt-dev libreadline-dev uuid-dev zlib1g-dev \
            libxml2-dev libxslt-dev libpq-dev

      - name: Build libxml2-rr
        working-directory: src/installations/libxml2-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug --without-mem-debug
          make -j$(nproc) libxml2rr.la

      - name: Build libxslt-rr
        working-directory: src/installations/libxslt-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug
          make -j$(nproc) -C libxslt
          make -j$(nproc) -C libexslt

      - name: Build generalserver
        working-directory: src
        run: |
          ./configure
          make -j$(nproc)

  fedora-40:
    name: Fedora 40
    runs-on: ubuntu-latest
    container: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make autoconf automake libtool pkg-config \
            libgcrypt-devel readline-devel libuuid-devel zlib-devel \
            libxml2-devel libxslt-devel libpq-devel

      - name: Build libxml2-rr
        working-directory: src/installations/libxml2-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug --without-mem-debug
          make -j$(nproc) libxml2rr.la

      - name: Build libxslt-rr
        working-directory: src/installations/libxslt-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug
          make -j$(nproc) -C libxslt
          make -j$(nproc) -C libexslt

      - name: Build generalserver
        working-directory: src
        run: |
          ./configure
          make -j$(nproc)

  fedora-41:
    name: Fedora 41
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make autoconf automake libtool pkg-config \
            libgcrypt-devel readline-devel libuuid-devel zlib-devel \
            libxml2-devel libxslt-devel libpq-devel

      - name: Build libxml2-rr
        working-directory: src/installations/libxml2-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug --without-mem-debug
          make -j$(nproc) libxml2rr.la

      - name: Build libxslt-rr
        working-directory: src/installations/libxslt-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug
          make -j$(nproc) -C libxslt
          make -j$(nproc) -C libexslt

      - name: Build generalserver
        working-directory: src
        run: |
          ./configure
          make -j$(nproc)
