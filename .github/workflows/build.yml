name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:

  # ── Native GitHub Actions runners ──────────────────────────────────────────

  ubuntu-22:
    name: Ubuntu 22.04
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libgcrypt-dev libreadline-dev uuid-dev zlib1g-dev \
            libxml2-dev libxslt-dev libpq-dev

      - name: Build libxml2-rr
        working-directory: src/installations/libxml2-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug --without-mem-debug
          make -j$(nproc) libxml2rr.la

      - name: Build libxslt-rr
        working-directory: src/installations/libxslt-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug
          make -j$(nproc) -C libxslt
          make -j$(nproc) -C libexslt

      - name: Build generalserver
        working-directory: src
        run: |
          ./configure
          make -j$(nproc)

  ubuntu-24:
    name: Ubuntu 24.04
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libgcrypt-dev libreadline-dev uuid-dev zlib1g-dev \
            libxml2-dev libxslt-dev libpq-dev

      - name: Build libxml2-rr
        working-directory: src/installations/libxml2-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug --without-mem-debug
          make -j$(nproc) libxml2rr.la

      - name: Build libxslt-rr
        working-directory: src/installations/libxslt-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug
          make -j$(nproc) -C libxslt
          make -j$(nproc) -C libexslt

      - name: Build generalserver
        working-directory: src
        run: |
          ./configure
          make -j$(nproc)

  # ── Docker-based jobs ───────────────────────────────────────────────────────
  # Linux Mint 21 is based on Ubuntu 22.04 (Jammy); Mint 22 on Ubuntu 24.04 (Noble).
  # Using the official linuxmintd images validates on the exact Mint userland.

  mint-21:
    name: Linux Mint 21 (Ubuntu 22.04 base)
    runs-on: ubuntu-latest
    container: linuxmintd/mint21.3-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libgcrypt-dev libreadline-dev uuid-dev zlib1g-dev \
            libxml2-dev libxslt-dev libpq-dev

      - name: Build libxml2-rr
        working-directory: src/installations/libxml2-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug --without-mem-debug
          make -j$(nproc) libxml2rr.la

      - name: Build libxslt-rr
        working-directory: src/installations/libxslt-rr
        run: |
          autoreconf -fi
          ./configure --without-python --without-debug
          make -j$(nproc) -C libxslt
          make -j$(nproc) -C libexslt

      - name: Build generalserver
        working-directory: src
        run: |
          ./configure
          make -j$(nproc)

  mint-22:
    name: Linux Mint 22 (Ubuntu 24.04 base)
    runs-on: ubuntu-latest
    container: linuxmintd/mint22.1-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
